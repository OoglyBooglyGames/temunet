<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        #toolbar{background:#111;padding:10px 15px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #222;z-index:10000;flex-shrink:0}
        #urlInput{flex:1;min-width:200px;padding:10px 15px;border:1px solid #333;background:#1a1a1a;color:#fff;border-radius:20px;font-size:13px;outline:none}
        #urlInput:focus{border-color:#f00}
        button{padding:10px 20px;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:#1a1a1a;color:#fff;white-space:nowrap}
        button:hover{background:#2a2a2a}
        #goBtn{background:#f00}
        #goBtn:hover{background:#c00}
        .quickBtn{padding:8px 15px;font-size:12px}
        #content{flex:1;position:relative;background:#fff;overflow:auto}
        #loading{position:fixed;top:0;left:0;height:3px;background:#f00;display:none;z-index:10001;width:100%;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        .navBtn{padding:8px 10px;min-width:35px;border-radius:50%;font-size:16px}
        #status{color:#666;font-size:11px;margin-left:auto}
        #proxyContent{width:100%;height:100%;border:none}
    </style>
</head>
<body>
    <div id="toolbar">
        <button class="navBtn" id="backBtn">←</button>
        <button class="navBtn" id="forwardBtn">→</button>
        <button class="navBtn" id="refreshBtn">↻</button>
        <input type="text" id="urlInput" placeholder="Enter URL or search..." autocomplete="off" spellcheck="false">
        <button id="goBtn">Go</button>
        <button class="quickBtn" data-url="https://www.youtube.com">▶ YouTube</button>
        <button class="quickBtn" data-url="https://www.reddit.com">Reddit</button>
        <button class="quickBtn" data-url="https://x.com">𝕏 X</button>
        <button class="quickBtn" data-url="https://www.google.com">Google</button>
        <span id="status">Ready</span>
    </div>
    <div id="loading"></div>
    <div id="content">
        <div id="proxyContent"></div>
    </div>
    
    <script>
        const proxyContent = document.getElementById('proxyContent');
        const urlInput = document.getElementById('urlInput');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        let historyStack = [];
        let historyIndex = -1;
        
        // THE REAL FIX: Load page content directly into the page
        // No iframe - the page BECOMES the proxied site
        
        async function loadPage(url, addToHistory = true) {
            loading.style.display = 'block';
            status.textContent = 'Loading...';
            urlInput.value = url;
            
            if (addToHistory) {
                if (historyIndex < historyStack.length - 1) {
                    historyStack = historyStack.slice(0, historyIndex + 1);
                }
                historyStack.push(url);
                historyIndex = historyStack.length - 1;
                try {
                    history.pushState({ url, index: historyIndex }, '', '?url=' + encodeURIComponent(url));
                } catch(e) {}
            }
            
            try {
                // Fetch through our proxy API
                const response = await fetch('/api/proxy?url=' + encodeURIComponent(url));
                const html = await response.text();
                
                // Inject the HTML directly into the page
                // This makes the browser think it's actually on the target site
                proxyContent.innerHTML = html;
                
                // Execute scripts manually
                const scripts = proxyContent.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    
                    // Copy all attributes
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    
                    // Copy inline code
                    newScript.textContent = oldScript.textContent;
                    
                    // Replace old script with new one (this executes it)
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
                
                loading.style.display = 'none';
                status.textContent = 'Loaded';
                
            } catch (error) {
                console.error('Failed to load:', error);
                loading.style.display = 'none';
                status.textContent = 'Error loading';
                
                // Fallback: use iframe inside the content div
                const iframe = document.createElement('iframe');
                iframe.style.cssText = 'width:100%;height:100%;border:none;';
                iframe.src = '/api/proxy?url=' + encodeURIComponent(url);
                proxyContent.innerHTML = '';
                proxyContent.appendChild(iframe);
            }
        }
        
        function navigate() {
            let url = urlInput.value.trim();
            if (!url) return;
            if (!url.startsWith('http')) {
                url = url.includes('.') && !url.includes(' ') ? 
                    'https://' + url : 
                    'https://www.google.com/search?q=' + encodeURIComponent(url);
            }
            loadPage(url);
        }
        
        // Handle all navigation events
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;
            if (e.data.type === 'NAVIGATE') {
                loadPage(e.data.url);
            } else if (e.data.type === 'URL_CHANGE') {
                urlInput.value = e.data.url;
                try {
                    history.replaceState({ url: e.data.url, index: historyIndex }, '', '?url=' + encodeURIComponent(e.data.url));
                } catch(e) {}
            }
        });
        
        // Intercept ALL navigation attempts on the main window
        window.addEventListener('beforeunload', function(e) {
            e.preventDefault();
            e.returnValue = '';
            return '';
        });
        
        // Override navigation on main window
        const originalOpen = window.open;
        window.open = function(url, target, features) {
            if (url) {
                loadPage(url.toString());
                return { closed: false, close: function(){}, focus: function(){} };
            }
            return originalOpen.apply(this, arguments);
        };
        
        document.getElementById('goBtn').addEventListener('click', navigate);
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') navigate(); });
        
        document.querySelectorAll('.quickBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                urlInput.value = btn.dataset.url;
                navigate();
            });
        });
        
        document.getElementById('backBtn').addEventListener('click', () => {
            if (historyIndex > 0) {
                historyIndex--;
                loadPage(historyStack[historyIndex], false);
            }
        });
        
        document.getElementById('forwardBtn').addEventListener('click', () => {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                loadPage(historyStack[historyIndex], false);
            }
        });
        
        document.getElementById('refreshBtn').addEventListener('click', () => {
            if (historyStack[historyIndex]) {
                loadPage(historyStack[historyIndex], false);
            }
        });
        
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.url) {
                urlInput.value = e.state.url;
                loadPage(e.state.url, false);
            }
        });
        
        // Handle clicks on proxied content
        proxyContent.addEventListener('click', function(e) {
            let target = e.target;
            while (target && target !== proxyContent) {
                if (target.tagName === 'A' && target.href && !target.href.startsWith('javascript:') && !target.href.startsWith('#')) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    let href = target.getAttribute('href');
                    // Check if it's already a proxy URL
                    if (href.startsWith('/api/proxy?url=')) {
                        const match = href.match(/url=([^&]+)/);
                        if (match) {
                            loadPage(decodeURIComponent(match[1]));
                        }
                    } else {
                        // Resolve relative URLs
                        const currentUrl = historyStack[historyIndex] || 'https://www.google.com';
                        const absolute = new URL(href, currentUrl).href;
                        loadPage(absolute);
                    }
                    return false;
                }
                target = target.parentElement;
            }
        });
        
        // Load initial URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('url')) {
            urlInput.value = decodeURIComponent(params.get('url'));
            navigate();
        }
    </script>
</body>
</html>
