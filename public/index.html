<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Web Proxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #toolbar {
            background: #111;
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid #222;
            z-index: 10000;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        
        #urlInput {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
        }
        
        #urlInput:focus {
            border-color: #ff0000;
            box-shadow: 0 0 0 2px rgba(255, 0, 0, 0.2);
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #1a1a1a;
            color: #fff;
            white-space: nowrap;
        }
        
        button:hover { background: #2a2a2a; }
        #goBtn { background: #ff0000; color: white; }
        #goBtn:hover { background: #cc0000; }
        .quickBtn { padding: 8px 15px; font-size: 12px; }
        
        #frameContainer { flex: 1; position: relative; }
        
        #proxyFrame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
        
        #loadingBar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff0000, #ff4444, #ff0000);
            background-size: 200% 100%;
            animation: loadingAnim 1.5s linear infinite;
            display: none;
            z-index: 10001;
        }
        
        @keyframes loadingAnim {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        .navBtn {
            padding: 8px 10px;
            min-width: 35px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .navBtn:hover { background: #2a2a2a; border-color: #ff0000; }
        #status { color: #666; font-size: 11px; margin-left: auto; }
    </style>
</head>
<body>
    <div id="toolbar">
        <button class="navBtn" id="backBtn">←</button>
        <button class="navBtn" id="forwardBtn">→</button>
        <button class="navBtn" id="refreshBtn">↻</button>
        
        <input type="text" id="urlInput" placeholder="Enter URL or search..." autocomplete="off" spellcheck="false">
        <button id="goBtn">Go</button>
        
        <button class="quickBtn" data-url="https://www.youtube.com">▶ YouTube</button>
        <button class="quickBtn" data-url="https://www.reddit.com">Reddit</button>
        <button class="quickBtn" data-url="https://x.com">𝕏 X</button>
        
        <span id="status">Ready</span>
    </div>
    
    <div id="loadingBar"></div>
    
    <div id="frameContainer">
        <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-presentation"></iframe>
    </div>
    
    <script>
        const iframe = document.getElementById('proxyFrame');
        const urlInput = document.getElementById('urlInput');
        const loadingBar = document.getElementById('loadingBar');
        const status = document.getElementById('status');
        
        let historyStack = [];
        let historyIndex = -1;
        let isLoading = false;
        
        // LISTEN FOR MESSAGES FROM IFRAME
        window.addEventListener('message', function(e) {
            if (e.data.type === 'NAVIGATE') {
                // Iframe wants to navigate
                navigateTo(e.data.url);
            } else if (e.data.type === 'URL_CHANGE') {
                // URL changed inside iframe
                updateUrlBar(e.data.url);
            }
        });
        
        function navigate() {
            let url = urlInput.value.trim();
            if (!url) return;
            
            // Handle search queries
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                if (url.includes(' ') || !url.includes('.')) {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                } else {
                    url = 'https://' + url;
                }
            }
            
            navigateTo(url);
        }
        
        function navigateTo(url) {
            if (isLoading) return;
            isLoading = true;
            
            loadingBar.style.display = 'block';
            status.textContent = 'Loading...';
            
            // Update URL bar
            urlInput.value = url;
            
            // Add to history
            if (historyIndex < historyStack.length - 1) {
                historyStack = historyStack.slice(0, historyIndex + 1);
            }
            historyStack.push(url);
            historyIndex = historyStack.length - 1;
            
            // Load through proxy
            const proxyUrl = '/api/proxy?url=' + encodeURIComponent(url);
            iframe.src = proxyUrl;
            
            // Update browser URL
            try {
                history.pushState({ url, index: historyIndex }, '', '?url=' + encodeURIComponent(url));
            } catch(e) {}
        }
        
        function updateUrlBar(url) {
            if (url && url !== 'about:blank') {
                urlInput.value = url;
            }
        }
        
        // Iframe load handler
        iframe.addEventListener('load', function() {
            loadingBar.style.display = 'none';
            status.textContent = 'Loaded';
            isLoading = false;
        });
        
        // Iframe error handler
        iframe.addEventListener('error', function() {
            loadingBar.style.display = 'none';
            status.textContent = 'Error loading';
            isLoading = false;
        });
        
        // Button handlers
        document.getElementById('goBtn').addEventListener('click', navigate);
        
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') navigate();
        });
        
        document.querySelectorAll('.quickBtn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                urlInput.value = this.dataset.url;
                navigate();
            });
        });
        
        document.getElementById('backBtn').addEventListener('click', function() {
            if (historyIndex > 0) {
                historyIndex--;
                const url = historyStack[historyIndex];
                urlInput.value = url;
                navigateTo(url);
            }
        });
        
        document.getElementById('forwardBtn').addEventListener('click', function() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                const url = historyStack[historyIndex];
                urlInput.value = url;
                navigateTo(url);
            }
        });
        
        document.getElementById('refreshBtn').addEventListener('click', function() {
            if (historyStack[historyIndex]) {
                navigateTo(historyStack[historyIndex]);
            }
        });
        
        // Browser back/forward
        window.addEventListener('popstate', function(e) {
            if (e.state && e.state.url) {
                urlInput.value = e.state.url;
                navigateTo(e.state.url);
            }
        });
        
        // Load initial URL from query parameter
        (function() {
            const params = new URLSearchParams(window.location.search);
            const initialUrl = params.get('url');
            if (initialUrl) {
                const decoded = decodeURIComponent(initialUrl);
                urlInput.value = decoded;
                navigateTo(decoded);
            }
        })();
    </script>
</body>
</html>
