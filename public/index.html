<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TemuNet v0.0.4</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        #toolbar{background:#111;padding:10px 15px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #222;z-index:10000;flex-shrink:0}
        #urlInput{flex:1;min-width:200px;padding:10px 15px;border:1px solid #333;background:#1a1a1a;color:#fff;border-radius:20px;font-size:13px;outline:none}
        #urlInput:focus{border-color:#f00}
        button{padding:10px 20px;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:#1a1a1a;color:#fff;white-space:nowrap}
        button:hover{background:#2a2a2a}
        #goBtn{background:#f00}
        .quickBtn{padding:8px 15px;font-size:12px}
        #frameContainer{flex:1;position:relative}
        #proxyFrame{width:100%;height:100%;border:none;background:#fff}
        #loading{position:fixed;top:0;left:0;height:3px;background:#f00;display:none;z-index:10001}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        .navBtn{padding:8px 10px;min-width:35px;border-radius:50%;font-size:16px}
        #status{color:#666;font-size:11px;margin-left:auto}
    </style>
</head>
<body>
    <div id="toolbar">
        <button class="navBtn" id="backBtn">←</button>
        <button class="navBtn" id="forwardBtn">→</button>
        <button class="navBtn" id="refreshBtn">↻</button>
        <input type="text" id="urlInput" placeholder="Enter URL..." autocomplete="off" spellcheck="false">
        <button id="goBtn">Go</button>
        <button class="quickBtn" data-url="https://www.youtube.com">▶ YouTube</button>
        <button class="quickBtn" data-url="https://www.reddit.com">Reddit</button>
        <button class="quickBtn" data-url="https://x.com">𝕏 X</button>
        <span id="status">Ready</span>
    </div>
    <div id="loading"></div>
    <div id="frameContainer">
        <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation"></iframe>
    </div>
    
    <script>
        // Register SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
        }
        
        const iframe = document.getElementById('proxyFrame');
        const urlInput = document.getElementById('urlInput');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        let historyStack = [], historyIndex = -1;
        
        function navigateTo(url, addToHistory) {
            if (addToHistory === undefined) addToHistory = true;
            loading.style.display = 'block';
            status.textContent = 'Loading...';
            urlInput.value = url;
            if (addToHistory) {
                if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
                historyStack.push(url);
                historyIndex = historyStack.length - 1;
                try { history.pushState({ url, index: historyIndex }, '', '?url=' + encodeURIComponent(url)); } catch(e) {}
            }
            iframe.src = '/api/proxy?url=' + encodeURIComponent(url);
        }
        
        function navigate() {
            let url = urlInput.value.trim();
            if (!url) return;
            if (!url.startsWith('http')) url = url.includes('.') && !url.includes(' ') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
            navigateTo(url);
        }
        
        iframe.addEventListener('load', () => { loading.style.display = 'none'; status.textContent = 'Loaded'; });
        document.getElementById('goBtn').addEventListener('click', navigate);
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') navigate(); });
        document.querySelectorAll('.quickBtn').forEach(btn => { btn.addEventListener('click', () => { urlInput.value = btn.dataset.url; navigate(); }); });
        document.getElementById('backBtn').addEventListener('click', () => { if (historyIndex > 0) { historyIndex--; navigateTo(historyStack[historyIndex], false); } });
        document.getElementById('forwardBtn').addEventListener('click', () => { if (historyIndex < historyStack.length - 1) { historyIndex++; navigateTo(historyStack[historyIndex], false); } });
        document.getElementById('refreshBtn').addEventListener('click', () => { if (historyStack[historyIndex]) navigateTo(historyStack[historyIndex], false); });
        window.addEventListener('popstate', (e) => { if (e.state && e.state.url) { urlInput.value = e.state.url; navigateTo(e.state.url, false); } });
        
        const params = new URLSearchParams(window.location.search);
        if (params.get('url')) { urlInput.value = decodeURIComponent(params.get('url')); navigate(); }
    </script>
</body>
</html>
