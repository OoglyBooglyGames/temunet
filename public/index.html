<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        #toolbar{background:#111;padding:10px 15px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #222;z-index:10000;flex-shrink:0;min-height:50px}
        #urlInput{flex:1;min-width:200px;padding:10px 15px;border:1px solid #333;background:#1a1a1a;color:#fff;border-radius:20px;font-size:13px;outline:none}
        #urlInput:focus{border-color:#f00}
        button{padding:10px 20px;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:#1a1a1a;color:#fff;white-space:nowrap}
        button:hover{background:#2a2a2a}
        #goBtn{background:#f00}
        .quickBtn{padding:8px 15px;font-size:12px}
        #frameContainer{flex:1;position:relative}
        #proxyFrame{width:100%;height:100%;border:none;background:#fff}
        #loading{position:fixed;top:0;left:0;height:3px;background:#f00;display:none;z-index:10001;width:100%;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        .navBtn{padding:8px 10px;min-width:35px;border-radius:50%;font-size:16px}
        #status{color:#666;font-size:11px;margin-left:auto}
    </style>
</head>
<body>
    <div id="toolbar">
        <button class="navBtn" id="backBtn">←</button>
        <button class="navBtn" id="forwardBtn">→</button>
        <button class="navBtn" id="refreshBtn">↻</button>
        <input type="text" id="urlInput" placeholder="Enter URL or search..." autocomplete="off" spellcheck="false">
        <button id="goBtn">Go</button>
        <button class="quickBtn" data-url="https://invidious.fdn.fr">▶ YouTube</button>
        <button class="quickBtn" data-url="https://www.reddit.com">Reddit</button>
        <button class="quickBtn" data-url="https://xcancel.com">𝕏 X (Nitter)</button>
        <span id="status">Ready</span>
    </div>
    <div id="loading"></div>
    <div id="frameContainer">
        <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-presentation allow-top-navigation-by-user-activation allow-popups-to-escape-sandbox"></iframe>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(){});
        }
        
        var iframe = document.getElementById('proxyFrame');
        var urlInput = document.getElementById('urlInput');
        var loading = document.getElementById('loading');
        var status = document.getElementById('status');
        var historyStack = [];
        var historyIndex = -1;
        var currentUrl = '';
        
        // Invidious instances that work well
        var invidiousInstances = [
            'https://invidious.fdn.fr',
            'https://inv.nadeko.net',
            'https://invidious.slipfox.xyz',
            'https://iv.ggtyler.dev',
            'https://invidious.drgns.space'
        ];
        
        function navigateTo(url, addToHistory) {
            if (addToHistory === undefined) addToHistory = true;
            
            loading.style.display = 'block';
            status.textContent = 'Loading...';
            urlInput.value = url;
            currentUrl = url;
            
            if (addToHistory) {
                if (historyIndex < historyStack.length - 1) {
                    historyStack = historyStack.slice(0, historyIndex + 1);
                }
                historyStack.push(url);
                historyIndex = historyStack.length - 1;
                try {
                    history.pushState({ url: url, index: historyIndex }, '', '?url=' + encodeURIComponent(url));
                } catch(e) {}
            }
            
            iframe.src = '/api/proxy?url=' + encodeURIComponent(url);
        }
        
        function navigate() {
            var url = urlInput.value.trim();
            if (!url) return;
            
            // Convert YouTube URLs to Invidious
            if (url.includes('youtube.com/watch?v=') || url.includes('youtu.be/')) {
                var videoId = '';
                if (url.includes('watch?v=')) {
                    videoId = url.split('watch?v=')[1].split('&')[0];
                } else if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split('?')[0];
                }
                if (videoId) {
                    url = invidiousInstances[Math.floor(Math.random() * invidiousInstances.length)] + '/watch?v=' + videoId;
                }
            } else if (url.includes('youtube.com/results?search_query=')) {
                var query = url.split('search_query=')[1].split('&')[0];
                url = invidiousInstances[Math.floor(Math.random() * invidiousInstances.length)] + '/search?q=' + query;
            } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                // General YouTube URL - try Invidious
                url = url.replace(/https?:\/\/(www\.)?youtube\.com/, invidiousInstances[Math.floor(Math.random() * invidiousInstances.length)]);
                url = url.replace(/https?:\/\/youtu\.be/, invidiousInstances[Math.floor(Math.random() * invidiousInstances.length)]);
            }
            
            // Convert Twitter/X URLs to Nitter
            if (url.includes('x.com') || url.includes('twitter.com')) {
                url = url.replace(/https?:\/\/(www\.)?x\.com/, 'https://xcancel.com');
                url = url.replace(/https?:\/\/(www\.)?twitter\.com/, 'https://xcancel.com');
            }
            
            if (!url.startsWith('http')) {
                if (url.includes('.') && !url.includes(' ')) {
                    url = 'https://' + url;
                } else {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }
            }
            
            navigateTo(url);
        }
        
        iframe.addEventListener('load', function() {
            loading.style.display = 'none';
            status.textContent = 'Loaded';
        });
        
        document.getElementById('goBtn').addEventListener('click', navigate);
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') navigate();
        });
        
        document.querySelectorAll('.quickBtn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                urlInput.value = this.dataset.url;
                navigate();
            });
        });
        
        document.getElementById('backBtn').addEventListener('click', function() {
            if (historyIndex > 0) {
                historyIndex--;
                navigateTo(historyStack[historyIndex], false);
            }
        });
        
        document.getElementById('forwardBtn').addEventListener('click', function() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                navigateTo(historyStack[historyIndex], false);
            }
        });
        
        document.getElementById('refreshBtn').addEventListener('click', function() {
            if (currentUrl) navigateTo(currentUrl, false);
        });
        
        window.addEventListener('popstate', function(e) {
            if (e.state && e.state.url) {
                urlInput.value = e.state.url;
                navigateTo(e.state.url, false);
            }
        });
        
        var params = new URLSearchParams(window.location.search);
        if (params.get('url')) {
            urlInput.value = decodeURIComponent(params.get('url'));
            navigate();
        }
    </script>
</body>
</html>
