<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Web Proxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #toolbar {
            background: #111;
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid #222;
            z-index: 10000;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        
        #urlInput {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
        }
        
        #urlInput:focus {
            border-color: #ff0000;
            box-shadow: 0 0 0 2px rgba(255, 0, 0, 0.2);
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #1a1a1a;
            color: #fff;
            white-space: nowrap;
        }
        
        button:hover { background: #2a2a2a; }
        
        #goBtn {
            background: #ff0000;
            color: white;
        }
        
        #goBtn:hover { background: #cc0000; }
        
        .quickBtn { padding: 8px 15px; font-size: 12px; }
        
        #frameContainer { flex: 1; position: relative; }
        
        #proxyFrame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
        
        #loadingBar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff0000, #ff4444, #ff0000);
            background-size: 200% 100%;
            animation: loadingAnim 1.5s linear infinite;
            display: none;
            z-index: 10001;
        }
        
        @keyframes loadingAnim {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        .navBtn {
            padding: 8px 10px;
            min-width: 35px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .navBtn:hover {
            background: #2a2a2a;
            border-color: #ff0000;
        }
        
        #status {
            color: #666;
            font-size: 11px;
            margin-left: auto;
        }
        
        @media (max-width: 768px) {
            #toolbar { padding: 8px; gap: 4px; }
            button { padding: 8px 12px; font-size: 11px; }
            .quickBtn { padding: 6px 10px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <button class="navBtn" id="backBtn" title="Back">←</button>
        <button class="navBtn" id="forwardBtn" title="Forward">→</button>
        <button class="navBtn" id="refreshBtn" title="Refresh">↻</button>
        <button class="navBtn" id="homeBtn" title="Home">⌂</button>
        
        <input type="text" id="urlInput" placeholder="Enter URL or search..." autocomplete="off" spellcheck="false">
        <button id="goBtn">Go</button>
        
        <button class="quickBtn" data-url="https://www.youtube.com">▶ YouTube</button>
        <button class="quickBtn" data-url="https://www.reddit.com">Reddit</button>
        <button class="quickBtn" data-url="https://x.com">𝕏 Twitter</button>
        <button class="quickBtn" data-url="https://www.google.com">Google</button>
        
        <span id="status">Ready</span>
    </div>
    
    <div id="loadingBar"></div>
    
    <div id="frameContainer">
        <iframe id="proxyFrame" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-presentation allow-orientation-lock allow-pointer-lock allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
        </iframe>
    </div>
    
    <script>
        class ProxyController {
            constructor() {
                this.iframe = document.getElementById('proxyFrame');
                this.urlInput = document.getElementById('urlInput');
                this.loadingBar = document.getElementById('loadingBar');
                this.status = document.getElementById('status');
                this.history = [];
                this.historyIndex = -1;
                this.currentUrl = '';
                
                this.init();
            }
            
            init() {
                document.getElementById('goBtn').onclick = () => this.navigate();
                this.urlInput.onkeypress = (e) => { if (e.key === 'Enter') this.navigate(); };
                
                document.querySelectorAll('.quickBtn').forEach(btn => {
                    btn.onclick = () => {
                        this.urlInput.value = btn.dataset.url;
                        this.navigate();
                    };
                });
                
                document.getElementById('backBtn').onclick = () => this.goBack();
                document.getElementById('forwardBtn').onclick = () => this.goForward();
                document.getElementById('refreshBtn').onclick = () => this.refresh();
                document.getElementById('homeBtn').onclick = () => this.goHome();
                
                this.iframe.onload = () => {
                    this.loadingBar.style.display = 'none';
                    this.status.textContent = 'Loaded';
                    this.updateUrlFromIframe();
                };
                
                // Handle browser back/forward
                window.addEventListener('popstate', (e) => {
                    if (e.state && e.state.url) {
                        this.loadUrl(e.state.url, false);
                    }
                });
                
                // Load initial URL if provided
                const urlParams = new URLSearchParams(window.location.search);
                const initialUrl = urlParams.get('url');
                if (initialUrl) {
                    this.urlInput.value = decodeURIComponent(initialUrl);
                    this.navigate();
                }
            }
            
            navigate() {
                let url = this.urlInput.value.trim();
                if (!url) return;
                
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    if (url.includes(' ') || !url.includes('.')) {
                        url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                    } else {
                        url = 'https://' + url;
                    }
                }
                
                this.loadUrl(url, true);
            }
            
            loadUrl(url, addToHistory) {
                this.loadingBar.style.display = 'block';
                this.status.textContent = 'Loading...';
                this.currentUrl = url;
                this.urlInput.value = url;
                
                if (addToHistory) {
                    if (this.historyIndex < this.history.length - 1) {
                        this.history = this.history.slice(0, this.historyIndex + 1);
                    }
                    this.history.push(url);
                    this.historyIndex = this.history.length - 1;
                }
                
                const proxyUrl = `/proxy?url=${encodeURIComponent(url)}`;
                this.iframe.src = proxyUrl;
                
                // Update browser URL
                history.pushState({ url: url }, '', `?url=${encodeURIComponent(url)}`);
            }
            
            updateUrlFromIframe() {
                try {
                    const iframeUrl = this.iframe.contentWindow.location.href;
                    if (iframeUrl.includes('?url=')) {
                        const urlParam = new URL(iframeUrl).searchParams.get('url');
                        if (urlParam) {
                            const decodedUrl = decodeURIComponent(urlParam);
                            this.urlInput.value = decodedUrl;
                            this.currentUrl = decodedUrl;
                        }
                    }
                } catch(e) {}
            }
            
            goBack() {
                if (this.historyIndex > 0) {
                    this.historyIndex--;
                    this.loadUrl(this.history[this.historyIndex], false);
                }
            }
            
            goForward() {
                if (this.historyIndex < this.history.length - 1) {
                    this.historyIndex++;
                    this.loadUrl(this.history[this.historyIndex], false);
                }
            }
            
            refresh() {
                if (this.currentUrl) {
                    this.loadUrl(this.currentUrl, false);
                }
            }
            
            goHome() {
                this.iframe.src = 'about:blank';
                this.urlInput.value = '';
                this.currentUrl = '';
                this.history = [];
                this.historyIndex = -1;
                this.status.textContent = 'Ready';
                history.pushState({}, '', '/');
            }
        }
        
        const controller = new ProxyController();
    </script>
</body>
</html>
